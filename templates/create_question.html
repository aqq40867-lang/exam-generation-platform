<!DOCTYPE html>
<html>
<head>
    <title>Create New Question</title>
</head>
<body>
    <h1>Create New Question</h1>

    <form method="POST">
        <label>Question title</label><br>
        <input type="text" name="title" required><br><br>

        <label>Main question text</label><br>
        <textarea name="main_text" required></textarea><br><br>

        <label>Marks</label><br>
        <input type="number" name="marks" required><br><br>

        <label>Answer</label><br>
        <textarea name="answer" required></textarea><br><br>

        <button type="submit">Save</button>
    </form>

    <br>
    <a href="{{ url_for('question_list') }}">Back to Question List</a>
</body>
</html>
